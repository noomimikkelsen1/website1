<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="position: sticky; top: 0; z-index: 50; background: rgba(240,236,226,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid #ddd7c8;">
  <div style="max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px;">
    <a href="Home.dc.html" style="text-decoration: none; font-family: Georgia, serif; font-size: 21px; font-weight: 700; letter-spacing: -0.01em; color: #1f2b25;">Kaffe Bueno</a>
    <div style="display: flex; gap: 30px; font-family: Inter, sans-serif; font-size: 14px;">
      <a href="Melanoidin Technology.dc.html" style="text-decoration: none; color: {{ c_tech }};">Technology</a>
      <a href="Science & Research.dc.html" style="text-decoration: none; color: {{ c_science }};">Science</a>
      <a href="Applications.dc.html" style="text-decoration: none; color: {{ c_apps }};">Applications</a>
      <a href="Sustainability.dc.html" style="text-decoration: none; color: {{ c_sus }};">Sustainability</a>
      <a href="About.dc.html" style="text-decoration: none; color: {{ c_about }};">About</a>
      <a href="News & Insights.dc.html" style="text-decoration: none; color: {{ c_news }};">News</a>
    </div>
    <a href="Contact.dc.html" style="text-decoration: none; font-family: Inter, sans-serif; font-size: 13px; font-weight: 600; color: #ffffff; background: #0E6E66; padding: 10px 20px; border-radius: 100px;">Partner with us</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || "";
    const on = "#1f2b25", off = "#5a6159";
    const c = (k) => active === k ? on : off;
    return {
      c_tech: c("tech"), c_science: c("science"),
      c_apps: c("apps"), c_sus: c("sus"), c_about: c("about"), c_news: c("news"),
    };
  }
}
</script>
</body>
</html>
